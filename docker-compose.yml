services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aeadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-analysis_engine}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aeadmin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-aeadmin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-analysis_engine}
      SESSION_DURATION_HOURS: 8
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "3001:3001"

  client:
    build: .
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: /api
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  db_data:
